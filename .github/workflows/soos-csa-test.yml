name: Build and Test Docker Image

on:
  pull_request: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: soosio/csa:${{ github.sha }}

      - name: Run Test Scan
        run: |
          docker run soosio/csa:${{ github.sha }} --clientId=${{secrets.SOOS_CLIENT_ID_DEV}} --apiKey=${{secrets.SOOS_API_KEY_DEV}} --apiURL="https://dev-api.soos.io/api/" --projectName="${{ github.event.repository.name }} alpine test" alpine

      - name: Save Docker Image
        run: docker save soosio/csa:${{ github.sha }} -o csa-image.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: csa-image-${{ github.sha }}
          path: csa-image.tar

  soos-csa:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: csa-image-${{ github.sha }}

      - name: Load Docker Image
        run: docker load -i csa-image.tar

      - name: Run SOOS CSA
        uses: soos-io/soos-csa-github-action@v1
        with:
          project_name: ${{ github.event.repository.name }}
          client_id: ${{ secrets.SOOS_CLIENT_ID_DEV }}
          api_key: ${{ secrets.SOOS_API_KEY_DEV }}
          api_url: "https://dev-api.soos.io/api/"
          target_image: soosio/csa:${{ github.sha }}
          other_docker_run_options: "-v /var/run/docker.sock:/var/run/docker.sock"